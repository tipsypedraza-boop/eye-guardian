name: Build Test

# 每次推送到 main 分支时测试构建（不创建 release）
on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master

jobs:
  # 快速测试 - 只构建 Windows
  test-build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: eye-guardian/pc-client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: eye-guardian/pc-client/src-tauri

      - name: Install dependencies
        working-directory: eye-guardian/pc-client
        run: npm ci

      - name: Build (test)
        working-directory: eye-guardian/pc-client
        run: npm run tauri:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-build-windows
          path: |
            eye-guardian/pc-client/src-tauri/target/release/bundle/msi/*.msi
            eye-guardian/pc-client/src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  # 测试 Linux 构建
  test-build-linux:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: eye-guardian/pc-client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: eye-guardian/pc-client/src-tauri

      - name: Install dependencies
        working-directory: eye-guardian/pc-client
        run: npm ci

      - name: Build (test)
        working-directory: eye-guardian/pc-client
        run: npm run tauri:build -- --bundles deb

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-build-linux
          path: eye-guardian/pc-client/src-tauri/target/release/bundle/deb/*.deb
          retention-days: 7
