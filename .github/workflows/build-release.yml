name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v* 标签时触发（如 v1.3.0）
  workflow_dispatch:  # 允许手动触发

jobs:
  # Windows 构建
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: eye-guardian/pc-client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: eye-guardian/pc-client/src-tauri

      - name: Install dependencies
        working-directory: eye-guardian/pc-client
        run: npm ci

      - name: Build Windows installers
        working-directory: eye-guardian/pc-client
        run: npm run tauri:build

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: eye-guardian/pc-client/src-tauri/target/release/bundle/msi/*.msi

      - name: Upload NSIS
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis
          path: eye-guardian/pc-client/src-tauri/target/release/bundle/nsis/*.exe

  # Linux DEB 构建
  build-linux:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: eye-guardian/pc-client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: eye-guardian/pc-client/src-tauri

      - name: Install dependencies
        working-directory: eye-guardian/pc-client
        run: npm ci

      - name: Build DEB package
        working-directory: eye-guardian/pc-client
        run: npm run tauri:build -- --bundles deb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: eye-guardian/pc-client/src-tauri/target/release/bundle/deb/*.deb

  # macOS 构建（可选）
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: eye-guardian/pc-client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: eye-guardian/pc-client/src-tauri

      - name: Install dependencies
        working-directory: eye-guardian/pc-client
        run: npm ci

      - name: Build DMG
        working-directory: eye-guardian/pc-client
        run: npm run tauri:build -- --bundles dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: eye-guardian/pc-client/src-tauri/target/release/bundle/dmg/*.dmg

  # 创建 GitHub Release
  create-release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/windows-msi/*.msi
            artifacts/windows-nsis/*.exe
            artifacts/linux-deb/*.deb
            artifacts/macos-dmg/*.dmg
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
